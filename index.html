<html lang="id">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f5ff 0%, #e6f0fa 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* ===== BACKGROUND GRADIEN ===== */
        .gradient-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
            overflow: hidden;
        }

        .line {
            position: absolute;
            width: 200%;
            height: 3px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                #ff9a9e 20%, 
                #fad0c4 40%, 
                #fad0c4 60%, 
                #ff9a9e 80%, 
                transparent 100%);
            animation: moveLine 10s linear infinite;
            filter: blur(2px);
        }

        .line:nth-child(1) { top: 20%; left: -50%; animation-duration: 14s; }
        .line:nth-child(2) { top: 40%; left: -30%; animation-duration: 18s; animation-delay: -3s; }
        .line:nth-child(3) { top: 60%; left: -70%; animation-duration: 12s; animation-delay: -5s; }
        .line:nth-child(4) { top: 80%; left: -20%; animation-duration: 20s; animation-delay: -2s; }
        .line:nth-child(5) { top: 30%; left: -90%; animation-duration: 16s; animation-delay: -7s; }

        @keyframes moveLine {
            0% { transform: translateX(0) rotate(0deg); }
            100% { transform: translateX(60%) rotate(3deg); }
        }

        /* ===== DECORATIVE CIRCLES ===== */
        .decorative-circles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 200, 200, 0.2), rgba(200, 180, 255, 0.2));
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -20px) scale(1.1); }
        }

        .circle:nth-child(1) { width: 200px; height: 200px; top: 10%; left: 5%; }
        .circle:nth-child(2) { width: 300px; height: 300px; bottom: 10%; right: 5%; animation-duration: 20s; }
        .circle:nth-child(3) { width: 150px; height: 150px; top: 50%; left: 80%; animation-duration: 12s; }

        /* ===== CONTAINER UTAMA ===== */
        .app-container {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        /* ===== HALAMAN LOGIN ===== */
        .login-page {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 16px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }

        .login-card {
            background: rgba(255, 255, 255, 0.85);

            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            max-width: 360px;

            font-weight: 700;

        }

            font-size: 0.9rem;
            padding-bottom: 16px;

        }

        .input-group label {

            color: #2c3e50;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .input-group input {

            padding: 14px 18px;

            border: 1.5px solid rgba(0,0,0,0.1);
            border-radius: 20px;
            color: #2c3e50;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;

        .input-group input:focus {

            background: white;
            box-shadow: 0 0 0 3px rgba(255, 154, 158, 0.2);
        }

            border: none;
            border-radius: 30px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.3);
        }

        .btn-login:active {
            transform: scale(0.96);
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .error-message {
            color: #c44545;
            background: rgba(255, 200, 200, 0.5);
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            margin-top: 16px;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
            display: none;
        }

        /* ===== HALAMAN UTAMA ===== */
        .main-page {
            width: 100%;
            min-height: 100vh;
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            flex-direction: column;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-page.visible {
            display: flex;
            opacity: 1;
        }

        /* navbar */
        .navbar {

            flex-direction: column;
            gap: 12px;
            padding: 16px;

            backdrop-filter: blur(10px);

            border: 1px solid rgba(255,255,255,0.8);

        .navbar-top {

        }

        .nav-item {

            color: #2c3e50;

            box-shadow: 0 4px 12px rgba(255, 154, 158, 0.2);
        }

        .word-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .indonesia {
            font-weight: 700;
            font-size: 1.2rem;
            color: #2c3e50;
        }

        .voice-btn {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(255, 154, 158, 0.3);
        }

        .voice-btn:active {
            transform: scale(0.9);
        }

        .voice-btn:hover {
            opacity: 0.9;
        }

        .voice-btn svg {
            width: 20px;
            height: 20px;
            fill: #2c3e50;
        }

        .voice-btn.playing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 154, 158, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 154, 158, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 154, 158, 0); }

        .inggris {
            font-weight: 600;
            font-size: 1.1rem;
            color: #ff6b6b;
            margin-bottom: 4px;

        .cara-baca {
            color: #5a6b7a;
            font-size: 0.9rem;
            font-style: italic;
            background: rgba(255, 154, 158, 0.1);
            padding: 6px 10px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 6px;
            border-left: 3px solid #ff9a9e;
        }

        .info-text {
            color: #2c3e50;
            font-size: 1rem;
            line-height: 1.6;
        }

        .info-text ul {
            margin-left: 20px;
            color: #5a6b7a;
        }

        /* loading dan infinite scroll */
        .loading {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .loading::after {
            content: '';
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 154, 158, 0.2);
            border-top-color: #ff9a9e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;

            margin-top: 20px;
            padding: 12px;
            background: rgba(255, 154, 158, 0.1);

            color: #2c3e50;
            font-weight: 500;

            background: rgba(255, 154, 158, 0.3);

            background: rgba(255, 154, 158, 0.2);

            position: fixed;
            bottom: 20px;
            left: 50%;

        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .word-count {
            background: #ff9a9e;
            color: white;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            margin-left: 6px;
        }
    </style>
</head>

    <script>
        (function() {
            // ===== SPEECH SYNTHESIS - Dideklarasikan di awal =====
            const synth = window.speechSynthesis;
            
            // ===== TOAST FUNCTION =====
            function showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }

            // ===== FUNGSI SPEAK =====
            function speakText(text) {
                try {
                    if (synth.speaking) {
                        synth.cancel();
                    }
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    
                    // Pilih suara Inggris
                    const voices = synth.getVoices();
                    const englishVoice = voices.find(v => v.lang.includes('en'));
                    if (englishVoice) {
                        utterance.voice = englishVoice;
                    }
                    
                    synth.speak(utterance);
                    return utterance;
                } catch (error) {
                    console.error('Speech error:', error);
                    showToast('‚ĚĆ Browser tidak mendukung fitur voice');
                    return null;
                }
            }

                    // Animasi tombol
                    const btn = event?.target?.closest('.voice-btn');
                    if (btn) {
                        btn.classList.add('playing');
                        if (utterance) {

                        } else {

                            <div class="content-header">ūüďč Tentang</div>
                            <div class="info-text">
                                <p><strong>Kamus Digital ID-EN v5.0</strong></p>
                                <p style="margin: 16px 0;">Database 700+ kata bahasa Indonesia ke Inggris lengkap dengan cara baca dan fitur voice.</p>
                                <p>Teknologi: HTML5, CSS3, JavaScript, Web Speech API</p>
                                <p style="margin-top: 16px;">Fitur:</p>
                                <ul style="margin-left: 20px;">
                                    <li>7 Kategori (masing-masing 100 kata)</li>
                                    <li>Tombol voice di setiap kata</li>
                                    <li>Infinite scroll</li>
                                    <li>Background gradien bergerak</li>
                                </ul>
                                <p style="margin-top: 20px; color: #ff6b6b;">¬© 2025 KamusKu 600+ Voice</p>
                            </div>
                        `;
                    } 
                    else {
                        currentData = dictionary[page] || [];
                        const title = getTitle(page);
                        const icon = getIcon(page);
                        
                        let itemsHtml = '';
                        const itemsToShow = currentData.slice(0, displayedItems);
                        
                        itemsToShow.forEach((item, index) => {
                            // Escape single quotes untuk teks
                            const enText = item.en.replace(/'/g, "\\'");
                            itemsHtml += `
                                <div class="dictionary-item" style="animation-delay: ${index * 0.02}s">
                                    <div class="word-header">
                                        <div class="indonesia">${item.id}</div>
                                        <button class="voice-btn" onclick="speakWord('${enText}')">
                                            <svg viewBox="0 0 24 24">
                                                <path d="M3 9v6h4l5 5V4L7 9H3z"/>
                                                <path d="M16 7c0 1.5.5 3 1.5 4.5.5 1 1 2 1 3s-.5 2-1 3c-1 1-1.5 2-1.5 3.5"/>
                                            </svg>
                                        </button>
                                    </div>
                                    <div class="inggris">ūüá¨ūüáß ${item.en}</div>
                                    <div class="cara-baca">ūüĒä ${item.pronunciation}</div>
                                </div>
                            `;
                        });

                        if (displayedItems < currentData.length) {
                            itemsHtml += `<div class="load-more" onclick="loadMore()">+ Tampilkan 20 kata lagi (${currentData.length - displayedItems} tersisa)</div>`;
                        }

                        contentArea.innerHTML = `
                            <div class="content-header">${icon} ${title} <span class="word-count">${currentData.length} kata</span></div>
                            <div class="dictionary-grid">
                                ${itemsHtml}
                            </div>
                        `;
                    }
                }, 300);
            }

            // ===== LOAD MORE =====
            window.loadMore = function() {
                displayedItems += 20;
                renderContent(currentPage, false);
            };

            function getTitle(page) {
                const titles = {
                    'kata-benda': 'Kata Benda',
                    'kata-makanan': 'Kata Makanan',
                    'kata-jalan': 'Kata Jalan',
                    'kata-warna': 'Kata Warna',
                    'kata-hewan': 'Kata Hewan',
                    'kata-teknologi': 'Kata Teknologi',
                    'kata-perjalanan': 'Kata Perjalanan'
                };
                return titles[page] || '';
            }

            function getIcon(page) {
                const icons = {
                    'kata-benda': 'ūüď¶',
                    'kata-makanan': 'ūüćú',
                    'kata-jalan': 'ūüõ£ÔłŹ',
                    'kata-warna': 'ūüé®',
                    'kata-hewan': 'ūüźė',
                    'kata-teknologi': 'ūüíĽ',
                    'kata-perjalanan': '‚úąÔłŹ'
                };
                return icons[page] || 'ūüďĖ';
            }

            function setActiveNav(page) {
                navItems.forEach(item => {
                    const dataPage = item.getAttribute('data-page');
                    if (dataPage === page) {
                        item.classList.add('active');
                        item.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    } else {
                        item.classList.remove('active');
                    }
                });
            }

            // ===== EVENT LISTENER =====
            navItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    const page = e.target.closest('.nav-item').getAttribute('data-page');
                    if (page) {
                        currentPage = page;
                        renderContent(currentPage);
                        setActiveNav(currentPage);
                    }
                });
            });

            loginBtn.addEventListener('click', () => {
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();

                if (email === validEmail && password === validPass) {
                    loginPage.style.display = 'none';
                    mainPage.classList.add('visible');
                    loginError.style.display = 'none';

                    currentPage = 'home';
                    renderContent('home');
                    setActiveNav('home');
                    showToast('‚úÖ Selamat datang!');
                } else {
                    loginError.style.display = 'block';
                    showToast('‚ĚĆ Email atau password salah');
                }
            });

            logoutBtn.addEventListener('click', () => {
                mainPage.classList.remove('visible');
                loginPage.style.display = 'flex';
                emailInput.value = 'erut@gmail.com';
                passwordInput.value = 'eru378902';
                loginError.style.display = 'none';
                showToast('ūüĎč Sampai jumpa!');
            });

            // ===== INIT =====
            // Sembunyikan error message di awal
            loginError.style.display = 'none';
            loginPage.style.display = 'flex';
            mainPage.classList.remove('visible');
            
            // Preload voices
            if (synth) {
                synth.getVoices();
            }
        })();
    </script>
</body>
</html>
